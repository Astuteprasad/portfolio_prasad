{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center px-6">
  <div class="text-center">
    <div class="font-display text-[10rem] font-800 leading-none text-dark-600 select-none mb-0">
      404
    </div>
    <div class="text-accent font-display text-xl font-700 mb-4 -mt-6">Page Not Found</div>
    <p class="text-gray-500 text-sm mb-8 max-w-xs mx-auto">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="{{ url_for('index') }}"
       class="px-6 py-3 bg-accent text-dark-900 font-display font-700 text-sm rounded-lg
              hover:bg-cyan-300 transition-all duration-200 glow-accent inline-flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"/>
      </svg>
      Go Home
    </a>
  </div>
</section>
{% endblock %}
